apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smart-paint-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/yourusername/smart-paint-platform.git'
    targetRevision: HEAD
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: smart-paint
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
