<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Personal Finance Tracker</h1>
        
        <!-- Form to Add Transactions -->
        <div class="form-container">
            <h2>Add Transaction</h2>
            <form id="transaction-form">
                <input type="text" id="description" placeholder="Description" required>
                <input type="number" id="amount" placeholder="Amount" required>
                <select id="category" required>
                    <option value="">Select Category</option>
                    <option value="Income">Income</option>
                    <option value="Food">Food</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Rent">Rent</option>
                    <option value="Utilities">Utilities</option>
                </select>
                <label>
                    <input type="checkbox" id="recurring"> Recurring
                </label>
                <button type="submit">Add Transaction</button>
            </form>
            <div class="error-message"></div>
            <div class="success-message"></div>
        </div>
        
        <!-- Monthly Budget -->
        <div class="monthly-budget">
            <input type="number" id="monthly-budget-input" placeholder="Set Monthly Budget">
            <button id="set-budget-button">Set Budget</button>
        </div>
        
        <!-- Transactions List -->
        <div class="transactions">
            <h2>Transactions</h2>
            <ul id="transaction-list"></ul>
        </div>
        
        <!-- Financial Summary -->
        <div class="summary">
            <h2>Summary</h2>
            <p>Total Income: <span id="total-income">$0</span></p>
            <p>Total Expenses: <span id="total-expenses">$0</span></p>
            <p>Balance: <span id="balance">$0</span></p>
            <p id="budget-status"></p>
        </div>
        
        <!-- Chart -->
        <div class="chart-container">
            <h2>Expense Breakdown</h2>
            <canvas id="expense-chart"></canvas>
        </div>
        
        <!-- Export CSV Button -->
        <button onclick="exportToCSV()">Export to CSV</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
