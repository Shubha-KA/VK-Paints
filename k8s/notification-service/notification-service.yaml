apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: vk-paints
data:
  RABBITMQ_URL: "amqp://rabbitmq"
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_SECURE: "false"
---
apiVersion: v1
kind: Secret
metadata:
  name: notification-service-secret
  namespace: vk-paints
type: Opaque
stringData:
  SMTP_USER: "shubhahima2003@gmail.com"
  SMTP_PASS: "iuyzfdcihcxrjlfk"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: vk-paints
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: notification-service:latest
        imagePullPolicy: IfNotPresent
        envFrom:
        - configMapRef:
            name: notification-service-config
        - secretRef:
            name: notification-service-secret
        ports:
        - containerPort: 3006
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: vk-paints
spec:
  selector:
    app: notification-service
  ports:
  - port: 80
    targetPort: 3006
