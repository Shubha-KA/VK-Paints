apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vk-paints-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/VK-Paints/vkpaints-helm-charts.git'
    targetRevision: main
    path: helm/vk-paints
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: vk-paints-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
