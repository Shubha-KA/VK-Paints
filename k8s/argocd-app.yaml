apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vk-paints-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Shubha-KA/VK-Paints.git'
    targetRevision: master
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: vkpaints-dev-ns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  syncOptions:
  - CreateNamespace=true
