apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vk-paints-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/yourusername/vk-paints-platform.git'
    targetRevision: HEAD
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: vk-paints
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
