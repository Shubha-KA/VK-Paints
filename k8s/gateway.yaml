apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: vk-paints-gateway
  namespace: vkpaints-gateway-ns
spec:
  gatewayClassName: kgateway
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: Selector
        selector:
          matchLabels:
            shared-gateway: "true"
